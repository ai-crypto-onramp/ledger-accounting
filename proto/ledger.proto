syntax = "proto3";

package ledger.v1;

service Ledger {
  rpc CreateAccount(CreateAccountRequest) returns (CreateAccountResponse);
  rpc PostPosting(PostingRequest) returns (PostingResponse);
  rpc GetPosting(GetPostingRequest) returns (PostingRecord);
  rpc GetBalance(GetBalanceRequest) returns (BalanceResponse);
  rpc VerifyChain(VerifyChainRequest) returns (VerifyChainResponse);
}

message CreateAccountRequest {
  optional string account_id = 1;
  string type = 2;
  string asset_class = 3;
  string label = 4;
  optional string parent_id = 5;
}

message CreateAccountResponse {
  string account_id = 1;
}

message EntryInput {
  string account_id = 1;
  string direction = 2;
  uint64 amount = 3;
  string asset = 4;
}

message PostingRequest {
  string posting_id = 1;
  repeated EntryInput entries = 2;
  optional string memo = 3;
  optional string ref_tx_id = 4;
}

message PostingResponse {
  string posting_id = 1;
  string status = 2;
  repeated string entry_ids = 3;
  string hash_head = 4;
}

message GetPostingRequest {
  string posting_id = 1;
}

message EntryRecord {
  string entry_id = 1;
  string posting_id = 2;
  string account_id = 3;
  string direction = 4;
  uint64 amount = 5;
  string asset = 6;
  uint64 sequence_number = 7;
  string prev_hash = 8;
  string this_hash = 9;
  string created_at = 10;
}

message PostingRecord {
  string posting_id = 1;
  optional string ref_tx_id = 2;
  optional string memo = 3;
  string status = 4;
  string hash_head = 5;
  repeated EntryRecord entries = 6;
  string created_at = 7;
}

message GetBalanceRequest {
  string account_id = 1;
  optional string asset = 2;
}

message BalanceResponse {
  string account_id = 1;
  string asset = 2;
  string balance = 3;
  string as_of_ts = 4;
}

message VerifyChainRequest {}

message VerifyChainResponse {
  bool ok = 1;
  optional string entry_id = 2;
  optional string reason = 3;
}